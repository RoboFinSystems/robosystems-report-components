name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Format Check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate Package Structure
        run: |
          # Check that the compiled library exists after build
          test -d dist || { echo "Missing dist/ — build did not emit output"; exit 1; }
          test -f package.json || { echo "Missing package.json"; exit 1; }
          test -f README.md || { echo "Missing README.md"; exit 1; }
          test -f LICENSE || { echo "Missing LICENSE"; exit 1; }
          echo "✅ Package structure validated"

      - name: Verify dist loads under Node ESM
        # The unit tests run against src/; this guards the *built* dist against
        # invalid ESM (e.g. extensionless relative imports), which a bundler
        # tolerates but Node / vitest / Next.js consumers reject.
        run: |
          node --input-type=module -e "
            await import('./dist/index.js');
            await import('./dist/adapters/index.js');
            console.log('✅ dist resolves under Node ESM');
          "
